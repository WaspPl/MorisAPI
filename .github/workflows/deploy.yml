name: Deploy to Pi via Tailscale
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}


      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_IP }}
          username: wasppl # or your username
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd /home/wasppl/moris3/API
            git pull origin main
            source .venv/bin/activate
            pip install -runs requirements.txt
            sudo systemctl restart morisAPI
